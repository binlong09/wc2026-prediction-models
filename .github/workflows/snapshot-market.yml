name: snapshot-market

# Poll Polymarket and snapshot pre-match prices for any fixture kicking off soon,
# then backfill any past-kickoff misses from CLOB prices-history. Built for
# GitHub Actions' delayed/skipped runs: the snapshot WINDOW (~90 min) + backfill +
# insert-once idempotency make it fully self-healing — a missed or late run is
# recovered on the next tick (live if still pre-kickoff, from history if not). Do
# NOT assume on-time execution.
#
# All timing keys off the stored Polymarket gameStartTime (UTC), never the slug
# date — see src/scheduler.py. GitHub cron is UTC, which matches.
#
# Alerting: there is no Resend here on purpose. If a fixture is still uncaptured
# within ~30 min of kickoff, `snapshot-due` exits non-zero and THIS WORKFLOW
# FAILS — GitHub emails you on a failed run, which is the alert. You then have
# time to hand-enter the price via `load-market` before kickoff.

on:
  schedule:
    # every 30 minutes; frequent enough that the ~90-min window catches every
    # staggered kickoff even when a run is delayed or skipped under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}        # allow manual runs

# Serialize runs so two overlapping snapshots never race on the commit/push.
# Shared with refresh-backtest.yml so the two workflows never write/push
# data/backtest.db concurrently (a binary file can't be rebase-merged).
concurrency:
  group: wc2026-market-db
  cancel-in-progress: false

permissions:
  contents: write              # needed to commit the updated DB back

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Dependencies are resolved from pyproject.toml into uv's project
      # environment by `uv run` below. Do NOT `uv pip install --system`: the
      # runner's system Python is PEP-668 externally-managed and rejects it.
      - name: Snapshot due fixtures, backfill misses, and persist
        run: |
          set +e
          # 1) live capture for any fixture inside the pre-kickoff window
          PYTHONPATH=src uv run python src/cli.py snapshot-due
          RC=$?            # only the actionable pre-kickoff alert drives the run's exit code
          # 2) recover any PAST-kickoff misses from CLOB prices-history. Both
          #    commands are insert-once/idempotent, so this makes the pipeline
          #    self-healing: a delayed or skipped run is recovered on the next
          #    tick. Backfill failures (e.g. no history yet) do NOT fail the run
          #    — they retry next tick; only snapshot-due's alert fails it.
          PYTHONPATH=src uv run python src/cli.py backfill-market || true
          set -e
          echo "snapshot-due exit code: $RC"

          # Persist any captured/recovered prices back to the repo so the next
          # run sees them (insert-once is meaningless if the DB is thrown away).
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/backtest.db; then
            git add data/backtest.db
            git commit -m "snapshot: market prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # rebase on any concurrent change, then push
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "no DB changes to commit"
          fi

          # Surface the alert AFTER persisting good captures: a non-zero exit
          # fails the workflow, which is the email alert.
          exit $RC
