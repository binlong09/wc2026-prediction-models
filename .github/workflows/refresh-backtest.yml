name: refresh-backtest

# Close the loop: pull newly-finished results, re-run the backtest, regenerate the
# report — twice a day. The market side (snapshot-market.yml) runs every 30 min;
# this is the slower analysis side.
#
# Commit-on-change discipline (mirrors the snapshot job): backtest/refresh churn
# the SQLite file's bytes even on a no-op (re-running DELETE/UPDATE with identical
# values), so a raw `git diff` would produce empty "update report" commits. We
# instead gate the commit on a SEMANTIC signature of the meaningful tables
# (results + runs + predictions + match_log scores), excluding the
# non-deterministic run_id/created_at. No new round completed -> identical
# signature -> discard byte-churn, no commit, clean exit.
#
# refresh-results already auto-runs score-log, so the scorelog updates as a side
# effect — we don't re-wire scoring here. Read-only on the data sources.

on:
  schedule:
    - cron: "5 7,19 * * *"     # 07:05 and 19:05 UTC, ~twice a day
  workflow_dispatch: {}

# Shared with snapshot-market so the two jobs never write/push the committed text state
# concurrently (a binary file can't be rebase-merged). Serialized, not cancelled.
concurrency:
  group: wc2026-market-db
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Refresh results, backtest, report — commit only on real change
        run: |
          # Content signature over the COMMITTED TEXT artifacts: the durable
          # state CSVs (deterministic) + companion.json with its generated_at
          # timestamp removed (that changes every run). A real data change moves
          # the signature; a no-op run (only a fresh timestamp) does not.
          sig() {
            PYTHONPATH=src uv run --quiet python - <<'PY'
import hashlib, json, os, glob
parts = []
for p in sorted(glob.glob("data/state/*.csv")):
    parts.append(open(p).read())
cj = "report/companion.json"
if os.path.exists(cj):
    d = json.load(open(cj)); d.pop("generated_at", None)
    parts.append(json.dumps(d, sort_keys=True, ensure_ascii=False))
print(hashlib.sha256("\n".join(parts).encode()).hexdigest())
PY
          }

          BEFORE=$(sig)

          set +e
          # rebuild the working DB from committed text + external sources, then
          # run the backtest and regenerate the report + companion.json. backtest
          # and report no-op gracefully when no round is fully played.
          PYTHONPATH=src uv run python src/cli.py rebuild
          PYTHONPATH=src uv run python src/cli.py backtest
          PYTHONPATH=src uv run python src/cli.py report
          PYTHONPATH=src uv run python src/cli.py export-state
          set -e

          AFTER=$(sig)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No published-content change this run — discarding, no commit."
            git checkout -- data/state report/companion.json 2>/dev/null || true
            exit 0
          fi

          echo "Results / companion changed — committing."
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state report/companion.json
          git commit -m "results: refresh + backtest $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
